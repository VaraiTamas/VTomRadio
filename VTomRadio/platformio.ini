; PlatformIO Project Configuration File
;
[env:esp32-s3-devkitc1-n16r8]
; Arduino Release v3.3.7 based on ESP-IDF v5.5.2.260206
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
; - framework-arduinoespressif32 @ 3.3.7 
; - framework-arduinoespressif32-libs @ 5.5.0+sha.87912cd291
;platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32-s3-devkitc1-n16r8
framework = arduino
;upload_protocol = espota

board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = partitions.csv
board_build.extra_flags = 
  -DBOARD_HAS_PSRAM

build_flags =
    -std=gnu++2a
    -fno-exceptions
    -Wall
    -Wextra
    -O2  ; gyorsabb futás, kisebb bináris.
    -fdiagnostics-color=always
    -DCORE_DEBUG_LEVEL=3  
    -std=gnu++20
    -D LGFX_USE_PNG

build_unflags = -std=gnu++11  ; Eltávolítja az alapértelmezett C++11 beállítást

board_build.f_cpu = 240000000L

board_build.filesystem = littlefs

lib_deps = 
  adafruit/RTClib@^2.1.4
  lovyan03/LovyanGFX@^1.2.19
    
; Soros monitor
monitor_speed = 460800
monitor_rts = 0
monitor_dtr = 0